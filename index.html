<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الرحلة المميزة</title>
    <style>
        :root { --gold: #d4af37; --blue: #1a2a6c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1350&q=80'); 
                height: 300px; background-size: cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .container { max-width: 800px; margin: -50px auto 50px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .btn-gallery { padding: 15px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; background: var(--blue); }
        .btn-gallery:hover { opacity: 0.8; transform: translateY(-2px); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .submit-btn:hover { background: #219150; }
    </style>
</head>
<body>

<div class="hero">
    <h1>رحلة العمر بانتظارك</h1>
</div>

<div class="container">
    <div class="buttons-grid">
        <button class="btn-gallery" onclick="alert('فتح معرض صور الفندق')">🏨 صور الفندق</button>
        <button class="btn-gallery" onclick="alert('فتح صور البحر')">🏖️ صور البحر</button>
        <button class="btn-gallery" onclick="alert('فتح الحديقة المائية')">💦 الحديقة المائية</button>
        <button class="btn-gallery" onclick="alert('فتح الأماكن الجميلة')">🎡 الألعاب والجمال</button>
    </div>

    <form id="registrationForm">
        <div class="form-group">
            <label>الاسم واللقب</label>
            <input type="text" id="fullName" required>
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1"><label>تاريخ الميلاد</label><input type="date" id="dob" required></div>
            <div style="flex:1"><label>مكان الميلاد</label><input type="text" id="pob" required></div>
        </div>
        <div class="form-group"><label>السكن الحالي</label><input type="text" id="address" required></div>
        <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required></div>
        
        <div class="form-group">
            <label>هل تجيد الإسعافات الأولية؟</label>
            <select id="firstAid"><option value="نعم">نعم</option><option value="لا">لا</option></select>
        </div>
        <div class="form-group">
            <label>هل أنت مصاب بأي مرض؟ (اتركه فارغاً إن لم يوجد)</label>
            <input type="text" id="medical">
        </div>
        
        <button type="submit" class="submit-btn">إرسال الطلب الآن</button>
    </form>
</div>

<script>
    const TELEGRAM_TOKEN ="8766563887:AAF8TLbcNDbkU3kpvIZHKI47cIFPosRmWSQ";
    const CHAT_ID ="5927792645";
    let registeredCount = 0; // ملاحظة: هذا العداد سيعود للصفر عند تحديث الصفحة (للتطبيق الحقيقي تحتاج قاعدة بيانات)

    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        registeredCount++;
        const data = {
            name: document.getElementById('fullName').value,
            dob: document.getElementById('dob').value,
            pob: document.getElementById('pob').value,
            address: document.getElementById('address').value,
            phone: document.getElementById('phone').value,
            aid: document.getElementById('firstAid').value,
            medical: document.getElementById('medical').value || "لا يوجد"
        };

        const message = `🔔 *طلب تسجيل جديد* (#${registeredCount})\n\n` +
                        `👤 الاسم: ${data.name}\n` +
                        `📅 الميلاد: ${data.dob} في ${data.pob}\n` +
                        `🏠 السكن: ${data.address}\n` +
                        `📞 الهاتف: ${data.phone}\n` +
                        `🚑 إسعافات: ${data.aid}\n` +
                        `🏥 الحالة الصحية: ${data.medical}\n\n` +
                        `ما هو قرارك؟`;

        // إرسال البيانات للتيليجرام مع أزرار التفاعل
        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
        const body = {
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'Markdown',
            reply_markup: {
                inline_keyboard: [
                    [{ text: "✅ قبول", callback_data: "accept" }, { text: "❌ رفض", callback_data: "reject" }]
                ]
            }
        };

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }).then(res => {
            alert("تم إرسال طلبك بنجاح!");
            if(registeredCount >= 37) {
                console.log("وصل عدد المسجلين لـ 37، يتم حفظ القائمة...");
                // هنا يمكن إضافة كود لتحميل ملف PDF أو Excel
            }
        });
    });
</script>
</body>
</html>
